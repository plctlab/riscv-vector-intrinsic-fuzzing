name: build
on:
  push:
    # branches: [develop]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: build generator
      run: |
        mkdir -p build
        cd build
        cmake ..
        make -j $(nproc)
        ./tool/random_gen
